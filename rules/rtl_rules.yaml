rules:
  - id: RTL001
    severity: violation
    rule: "No latches — every always_ff/always block must have complete assignments in all branches"

  - id: RTL002
    severity: violation
    rule: "All case statements must have a default branch"

  - id: RTL003
    severity: violation
    rule: "Reset must be asynchronous and active-low (negedge rst_n)"

  - id: RTL004
    severity: violation
    rule: "Use always_ff for sequential, always_comb for combinational — not plain always"

  - id: RTL005
    severity: warning
    rule: "Port names must follow i_ prefix for inputs, o_ prefix for outputs"

  - id: RTL006
    severity: violation
    rule: "No X assignments — all signals must have a defined reset state"

  - id: RTL007
    severity: violation
    rule: "No multi-driven nets — each signal driven by only one always block"

  - id: RTL008
    severity: warning
    rule: "Parameters must be used for widths — no hardcoded numbers in port declarations"

  - id: RTL009
    severity: warning
    rule: "Module name must match filename"

  - id: RTL010
    severity: warning
    rule: "No unused signals or ports"
